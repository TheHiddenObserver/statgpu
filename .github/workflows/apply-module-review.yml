name: Apply ANOVA Kernel Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-review-patch:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply focused patch
        run: |
          python dev/manual/apply_anova_kernel_review.py
          python - <<'PY'
          from pathlib import Path
          path = Path('dev/tests/test_anova_p2.py')
          text = path.read_text()
          old = '''    def test_unbalanced(self):
        np.random.seed(42)
        data = [
            [np.random.randn(5), np.random.randn(10), np.random.randn(8)],
            [np.random.randn(12), np.random.randn(6), np.random.randn(9)],
        ]
        r = f_twoway(data, interaction=True)
        assert r.factor_a_statistic > 0
'''
          new = '''    def test_unbalanced_requires_explicit_ss_type(self):
        np.random.seed(42)
        data = [
            [np.random.randn(5), np.random.randn(10), np.random.randn(8)],
            [np.random.randn(12), np.random.randn(6), np.random.randn(9)],
        ]
        with pytest.raises(ValueError, match="balanced"):
            f_twoway(data, interaction=True)
'''
          if text.count(old) != 1:
              raise RuntimeError('unexpected legacy unbalanced ANOVA test content')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff
      - name: Compile and statically check modified modules
        run: |
          python -m compileall -q \
            statgpu/anova \
            statgpu/nonparametric/kernel_methods \
            dev/tests/test_module_review_anova_kernel.py
          ruff check \
            statgpu/anova \
            statgpu/nonparametric/kernel_methods \
            dev/tests/test_module_review_anova_kernel.py \
            --select F821,E9,F63,F7,F82,B023
      - name: Run focused and existing regression tests
        run: |
          set +e
          python -m pytest \
            dev/tests/test_module_review_anova_kernel.py \
            dev/tests/test_anova_p2.py \
            dev/tests/test_kernel_methods_p2.py \
            -q --tb=short > /tmp/module-review-tests.log 2>&1
          status=$?
          tail -n 180 /tmp/module-review-tests.log
          exit $status
      - name: Commit reviewed source changes
        run: |
          rm -f dev/manual/apply_anova_kernel_review.py
          rm -f .github/workflows/apply-module-review.yml
          rm -f .github/workflows/repository-audit.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add statgpu dev/tests dev/manual .github/workflows
          git commit -m 'fix: harden ANOVA and kernel method contracts'
          git push origin HEAD:agent/code-review-fixes
