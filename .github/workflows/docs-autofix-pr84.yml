name: PR84 Documentation Autofix

on:
  push:
    branches: [agent/readme-layout-cleanup]

permissions:
  contents: write

jobs:
  normalize-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/readme-layout-cleanup
      - name: Normalize mirrored documentation links
        run: python3 dev/validation/fix_docs_links.py --write
      - name: Commit normalized links
        shell: bash
        run: |
          if git diff --quiet -- docs; then
            echo "No documentation link changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          git commit -m "docs: normalize mirrored documentation links"
          git push origin HEAD:agent/readme-layout-cleanup
