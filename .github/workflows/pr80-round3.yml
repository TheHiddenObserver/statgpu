name: PR80 round-three fix

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-round-three-fix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'codex/survival-gpu-completion'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply reviewed patch
        run: |
          git apply --check .github/pr80-round3.patch
          git apply .github/pr80-round3.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate round-three fix
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install pyflakes
          python -m compileall -q statgpu dev/tests
          python -m pyflakes \
            statgpu/linear_model/penalized/_penalized_cox.py \
            dev/tests/test_penalized_cox_completion.py
          python -m pytest dev/tests/test_penalized_cox_completion.py -q --tb=short

      - name: Commit round-three fix
        run: |
          git config user.name "OpenAI Review"
          git config user.email "review@openai.local"
          git add \
            CHANGELOG.md \
            dev/tests/test_penalized_cox_completion.py \
            statgpu/linear_model/penalized/_penalized_cox.py
          git commit -m "fix(survival): align penalized Cox formula scoring"
          git push origin HEAD:${{ github.head_ref }}
