name: Three Backend Native Follow-up

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  torch-cpu-parity:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies quietly
        run: |
          python -m pip install -q --upgrade pip
          python -m pip install -q -e ".[validation,formula,torch]"
          python -m pip install -q ruff
      - name: Compile and static check
        run: |
          python -m compileall -q \
            statgpu/covariance \
            statgpu/nonparametric/splines \
            statgpu/panel/_fama_macbeth.py \
            statgpu/anova/_posthoc.py \
            dev/tests/test_three_backend_native_followup.py
          ruff check \
            statgpu/covariance \
            statgpu/nonparametric/splines \
            statgpu/panel/_fama_macbeth.py \
            statgpu/anova/_posthoc.py \
            dev/tests/test_three_backend_native_followup.py \
            --select F821,E9,F63,F7,F82,B023
      - name: Run parity and affected regression suites
        id: focused
        continue-on-error: true
        run: |
          python -m pytest \
            dev/tests/test_three_backend_native_followup.py \
            dev/tests/test_module_review_covariance_panel.py \
            dev/tests/test_module_review_smoothing_splines_gam_metrics.py \
            dev/tests/test_module_review_anova_kernel.py \
            dev/tests/test_splines_p2.py \
            dev/tests/test_anova_p2.py \
            -q --tb=long > /tmp/native-parity.log 2>&1
      - name: Upload parity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-parity-log
          path: /tmp/native-parity.log
          retention-days: 2
      - name: Enforce focused result
        if: steps.focused.outcome != 'success'
        run: |
          tail -n 80 /tmp/native-parity.log
          exit 1
