name: PR79 review fix diagnose

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read
  pull-requests: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 79
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0

      - name: Diagnose third-round patch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import runpy
          import subprocess
          import traceback

          try:
              runpy.run_path(
                  'dev/scripts/apply_pr79_review_fixes_round3.py',
                  run_name='__main__',
              )
          except Exception:
              body = (
                  '## PR79 round-3 diagnostic\n\n```text\n'
                  + traceback.format_exc()
                  + '\n```'
              )
              subprocess.run(
                  ['gh', 'pr', 'comment', '79', '--repo',
                   'TheHiddenObserver/statgpu', '--body', body],
                  check=True,
              )
              raise
          else:
              subprocess.run(
                  ['gh', 'pr', 'comment', '79', '--repo',
                   'TheHiddenObserver/statgpu', '--body',
                   '## PR79 round-3 diagnostic\n\nPatch applied cleanly.'],
                  check=True,
              )
          PY
