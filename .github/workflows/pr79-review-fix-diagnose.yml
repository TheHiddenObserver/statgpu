name: PR79 review fix diagnose

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  diagnose:
    if: github.event.pull_request.number == 79
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0

      - name: Persist disambiguated patch traceback
        run: |
          python - <<'PY'
          from pathlib import Path
          import runpy
          import traceback

          try:
              runpy.run_path(
                  'dev/scripts/apply_pr79_review_fixes_round3b.py',
                  run_name='__main__',
              )
          except Exception:
              Path('dev/reviews/pr79_round3_traceback.txt').write_text(
                  traceback.format_exc()
              )
          else:
              Path('dev/reviews/pr79_round3_traceback.txt').write_text(
                  'Patch applied cleanly.\n'
              )
          PY

      - name: Commit diagnostic
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dev/reviews/pr79_round3_traceback.txt
          git commit -m "chore: record PR79 round-three patch diagnostic"
          git push origin HEAD:agent/code-review-fixes
