name: Diagnose ANOVA Kernel Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply patch in workspace
        run: python dev/manual/apply_anova_kernel_review.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Run regression tests and capture output
        id: tests
        continue-on-error: true
        run: |
          python -m pytest \
            dev/tests/test_module_review_anova_kernel.py \
            dev/tests/test_anova_p2.py \
            dev/tests/test_kernel_methods_p2.py \
            -vv --tb=long --junitxml=/tmp/junit.xml \
            > /tmp/pytest.log 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: anova-kernel-diagnostics
          path: |
            /tmp/pytest.log
            /tmp/junit.xml
      - name: Fail when tests failed
        if: steps.tests.outcome != 'success'
        run: |
          tail -n 80 /tmp/pytest.log
          exit 1
