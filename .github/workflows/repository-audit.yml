name: Repository Audit

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  full-package-audit:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install audit dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff vulture
      - name: Compile all maintained Python
        run: python -m compileall -q statgpu dev
      - name: High-signal Ruff audit
        continue-on-error: true
        run: |
          ruff check statgpu \
            --select F821,E9,F63,F7,F82,B006,B007,B023,B028 \
            --output-format concise
      - name: High-confidence dead-code audit
        continue-on-error: true
        run: vulture statgpu --min-confidence 100
      - name: Exception and backend-boundary inventory
        run: |
          python - <<'PY'
          from pathlib import Path
          import ast

          roots = list(Path('statgpu').rglob('*.py'))
          bare_pass = []
          broad_pass = []
          numpy_boundaries = []
          for path in roots:
              text = path.read_text(encoding='utf-8')
              try:
                  tree = ast.parse(text)
              except SyntaxError:
                  continue
              lines = text.splitlines()
              for node in ast.walk(tree):
                  if isinstance(node, ast.ExceptHandler):
                      body_is_pass = len(node.body) == 1 and isinstance(node.body[0], ast.Pass)
                      if node.type is None and body_is_pass:
                          bare_pass.append((str(path), node.lineno))
                      if isinstance(node.type, ast.Name) and node.type.id == 'Exception' and body_is_pass:
                          broad_pass.append((str(path), node.lineno))
              for i, line in enumerate(lines, 1):
                  if ('_to_numpy(' in line or '.get()' in line or '.cpu().numpy()' in line) and 'test' not in str(path):
                      numpy_boundaries.append((str(path), i, line.strip()))
          print('BARE_EXCEPT_PASS', len(bare_pass))
          for item in bare_pass[:100]: print(item)
          print('BROAD_EXCEPTION_PASS', len(broad_pass))
          for item in broad_pass[:100]: print(item)
          print('HOST_BOUNDARIES', len(numpy_boundaries))
          for item in numpy_boundaries[:250]: print(item)
          PY
