name: PR79 Third Review Snapshot

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  snapshot:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create repository snapshot
        run: |
          tar --exclude=.git --exclude='*.pyc' --exclude='__pycache__' -czf /tmp/statgpu-pr79-third-review.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: statgpu-pr79-third-review
          path: /tmp/statgpu-pr79-third-review.tar.gz
          retention-days: 2
