name: Export Benchmark Audit

on:
  push:
    branches: [frontend-dashboard-data-pipeline]
    paths:
      - '.github/workflows/export-benchmark-audit.yml'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: frontend-dashboard-data-pipeline
      - name: Build benchmark target paths
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          TARGETS = {
              'robust_quantile': ('robust', 'quantile', 'huber', 'bisquare', 'pinball'),
              'unsupervised': ('unsupervised', 'pca', 'kmeans', 'dbscan', 'nmf', 'umap', 'tsne', 'gaussianmixture'),
              'ordered': ('ordered', 'ordinal', 'orderedlogit', 'orderedprobit'),
              'nonparametric': ('nonparametric', 'kernel_regression', 'kde', 'spline', 'gam'),
              'panel': ('panel', 'fixed_effect', 'random_effect'),
              'covariance': ('covariance', 'cov_type', 'hc2', 'hc3', 'hac'),
              'linear_recent': ('penalized_glm', 'glm_solver', 'squared_error'),
          }

          result = {key: [] for key in TARGETS}
          for root in (Path('results'), Path('dev/results')):
              if not root.exists():
                  continue
              for path in sorted(root.rglob('*.json')):
                  try:
                      raw = path.read_text(encoding='utf-8')
                      json.loads(raw)
                  except Exception:
                      continue
                  haystack = (path.as_posix() + '\n' + raw[:200000]).lower()
                  for target, tokens in TARGETS.items():
                      if any(token in haystack for token in tokens):
                          result[target].append({
                              'path': path.as_posix(),
                              'size_bytes': path.stat().st_size,
                          })

          out = Path('dev/benchmarks/benchmark_target_paths.json')
          out.write_text(json.dumps(result, indent=2), encoding='utf-8')
          print({key: len(value) for key, value in result.items()})
          PY
      - name: Commit inventory
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add dev/benchmarks/benchmark_target_paths.json
          git diff --cached --quiet && exit 0
          git commit -m 'chore(audit): list benchmark target paths'
          git push origin HEAD:frontend-dashboard-data-pipeline
