name: PR79 Apply Second Review

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-review:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Verify and apply review patch
        run: |
          cat dev/tmp/pr79_patch_*.txt > /tmp/pr79_second_review.patch.xz.b64
          echo '7abfd915d380b2e40c14759861cfa36ffec13389467103b2fcc0fd5748ea0b45  /tmp/pr79_second_review.patch.xz.b64' | sha256sum -c -
          base64 --decode /tmp/pr79_second_review.patch.xz.b64 > /tmp/pr79_second_review.patch.xz
          xz --decompress --stdout /tmp/pr79_second_review.patch.xz > /tmp/pr79_second_review.patch
          echo 'd493bc92cec7cb70b778065932a99a03377474660f2469f05aa9cc21a932d60a  /tmp/pr79_second_review.patch' | sha256sum -c -
          patch --batch --forward -p1 < /tmp/pr79_second_review.patch
      - name: Remove temporary transfer artifacts
        run: |
          rm -f dev/tmp/pr79_patch_*.txt
          rmdir dev/tmp 2>/dev/null || true
          rm -f .github/workflows/pr79-source-export.yml
          rm -f .github/workflows/pr79-apply-second-review.yml
      - name: Install review dependencies
        run: python -m pip install -e '.[dev]'
      - name: Compile changed Python sources
        run: python -m compileall -q statgpu dev/tests
      - name: Run focused second-review regression suite
        run: python -m pytest -q dev/tests/test_second_full_review.py
      - name: Commit reviewed implementation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: complete second full-repository review'
          git push origin HEAD:${{ github.head_ref }}
