name: PR79 Documentation Consistency

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply documentation consistency pass
        run: python dev/scripts/finalize_pr79_docs_consistency.py
      - name: Remove temporary files
        run: |
          rm -f dev/scripts/finalize_pr79_docs_consistency.py
          rm -f .github/workflows/pr79-doc-consistency.yml
      - name: Commit documentation consistency fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: complete PR79 documentation consistency pass"
          git push origin HEAD:${{ github.head_ref }}
