name: PR79 Documentation Finalize

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Correct covariance algorithm description
        run: python dev/scripts/fix_pr79_covariance_doc.py
      - name: Remove temporary files
        run: |
          rm -f dev/scripts/fix_pr79_covariance_doc.py
          rm -f .github/workflows/pr79-doc-finalize.yml
      - name: Commit corrected documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "docs: correct Graphical Lasso algorithm details"
          git push origin HEAD:${{ github.head_ref }}
