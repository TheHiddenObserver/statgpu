name: Apply Post-Ridge Audit Documentation

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  synchronize-docs:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Synchronize review documentation
        run: python dev/manual/apply_post_ridge_audit_docs.py
      - name: Verify history and markers
        run: |
          python - <<'PY'
          from pathlib import Path
          checks = {
              'CHANGELOG.md': 'Public module statistical-contract follow-up',
              'docs/en/changelog.md': 'PR #79 public-module follow-up',
              'docs/cn/changelog.md': 'PR #79 公开模块后续审查',
              'dev/reviews/pr79_full_repository_review.md': 'Post-Ridge public module audit',
          }
          for filename, marker in checks.items():
              text = Path(filename).read_text(encoding='utf-8')
              assert marker in text, (filename, marker)
          assert '### Added (2026-07-07)' in Path('docs/en/changelog.md').read_text()
          assert '### 新增 (2026-07-07)' in Path('docs/cn/changelog.md').read_text()
          PY
      - name: Commit documentation and remove temporary assets
        run: |
          rm -f dev/manual/apply_post_ridge_audit_docs.py
          rm -f .github/workflows/apply-post-ridge-audit-docs.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: record post-Ridge public module audit'
          git push origin HEAD:agent/code-review-fixes
