name: PR79 Welch Compatibility Fix

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  fix-welch-reference:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Apply compatibility correction
        run: python dev/scripts/fix_welch_reference_compat.py
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Verify Welch reference test
        run: python -m pytest -q dev/tests/test_second_full_review.py::TestWelchBackendAndReference
      - name: Remove temporary diagnostics
        run: |
          rm -f dev/scripts/fix_welch_reference_compat.py
          rm -f .github/workflows/pr79-py39-py310-diagnostics.yml
          rm -f .github/workflows/pr79-welch-compat-fix.yml
      - name: Commit compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: keep Welch reference compatible with Python 3.9 and 3.10"
          git push origin HEAD:${{ github.head_ref }}
