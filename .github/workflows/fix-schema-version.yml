name: One-off schema version fix

on:
  push:
    branches: [frontend-dashboard-data-pipeline]
    paths:
      - '.github/workflows/fix-schema-version.yml'

permissions:
  contents: write

jobs:
  fix-schema-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: frontend-dashboard-data-pipeline
      - name: Pin benchmark schema version
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('dev/benchmarks/benchmark_frontend_schema.json')
          text = path.read_text(encoding='utf-8')
          old = '"schema_version": { "type": "string" }'
          new = '"schema_version": { "const": "1.1.0" }'
          if old not in text:
              raise SystemExit('expected schema_version declaration not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Commit schema fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dev/benchmarks/benchmark_frontend_schema.json
          git commit -m 'fix(schema): pin benchmark frontend version to 1.1.0'
          git push origin HEAD:frontend-dashboard-data-pipeline
