name: PR79 finalize validation docs

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  finalize-docs:
    if: github.event.pull_request.number == 79
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Update final validation documentation
        run: |
          set +e
          python dev/scripts/finalize_pr79_gpu_validation.py > /tmp/pr79-docs.log 2>&1
          rc=$?
          if [ "$rc" -ne 0 ]; then
            cp /tmp/pr79-docs.log dev/reviews/pr79_finalize_docs_error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dev/reviews/pr79_finalize_docs_error.txt
            git commit -m "chore: capture PR79 docs updater failure"
            git push origin HEAD:agent/code-review-fixes
            exit "$rc"
          fi

      - name: Commit and push documentation
        run: |
          if git diff --quiet; then
            echo "No documentation changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md docs/en/changelog.md docs/cn/changelog.md dev/reviews/pr79_physical_gpu_validation.md
          git commit -m "docs: record PR79 exact-head GPU acceptance"
          git push origin HEAD:agent/code-review-fixes
