name: Benchmark Frontend CI

on:
  pull_request:
    paths:
      - '.github/workflows/benchmark-frontend.yml'
      - 'dev/tests/test_frontend_contracts.py'

permissions:
  contents: write

jobs:
  review-fix:
    if: github.head_ref == 'feature/benchmark-frontend-dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Separate reference and measured scale fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('dev/tests/test_frontend_contracts.py')
          text = path.read_text(encoding='utf-8')
          old = '''        "run_id": "measured",\n        "backend": "cupy",\n        "source": {"file": "measured.json", "source_id": "measured-source"},\n'''
          new = '''        "run_id": "measured",\n        "backend": "cupy",\n        "scale": dict(reference["scale"]),\n        "source": {"file": "measured.json", "source_id": "measured-source"},\n'''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8')
          elif new not in text:
              raise SystemExit('Expected measured fixture block not found')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'test(benchmarks): isolate speedup scale fixture'
          branch: feature/benchmark-frontend-dashboard
          file_pattern: dev/tests/test_frontend_contracts.py
