name: Benchmark Frontend CI

on:
  pull_request:
    paths:
      - '.github/workflows/benchmark-frontend.yml'
      - 'dev/benchmarks/**'
      - 'dev/tests/test_frontend_contracts.py'
      - 'pyproject.toml'

permissions:
  contents: read

jobs:
  diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install diagnostic dependencies
        run: python -m pip install -U pip pytest jsonschema
      - name: Capture contract test output
        run: |
          mkdir -p diagnostics
          pytest dev/tests/test_frontend_contracts.py -vv \
            > diagnostics/pytest.log 2>&1 || true
      - name: Capture generator output
        run: |
          python dev/benchmarks/generate_benchmark_data.py --check --strict-sources \
            > diagnostics/generator.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-review-diagnostics
          path: diagnostics/
          retention-days: 1
