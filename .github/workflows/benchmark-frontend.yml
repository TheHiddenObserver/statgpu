name: Benchmark Frontend CI

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/benchmark-frontend.yml'
      - 'dev/benchmarks/**'
      - 'dev/tests/test_benchmark_frontend_data.py'
      - 'dev/tests/test_frontend_contracts.py'
      - 'dev/tests/test_frontend_domain_coverage.py'
      - 'dev/tests/fixtures/benchmark_frontend/**'
      - 'frontend/**'
      - 'docs/assets/benchmarks/**'
      - 'results/benchmark_frontend_sources/**'
  pull_request:
    paths:
      - '.github/workflows/benchmark-frontend.yml'
      - 'dev/benchmarks/**'
      - 'dev/tests/test_benchmark_frontend_data.py'
      - 'dev/tests/test_frontend_contracts.py'
      - 'dev/tests/test_frontend_domain_coverage.py'
      - 'dev/tests/fixtures/benchmark_frontend/**'
      - 'frontend/**'
      - 'docs/assets/benchmarks/**'
      - 'results/benchmark_frontend_sources/**'

permissions:
  contents: write

jobs:
  review-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/benchmark-frontend-dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply timing validation review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'Expected block not found in {path}: {old[:80]!r}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          cli = Path('dev/benchmarks/frontend_data/cli.py')
          replace_once(
              cli,
              'import json\nimport hashlib\nimport sys\n',
              'import json\nimport hashlib\nimport math\nimport sys\n',
          )
          replace_once(
              cli,
              '\ndef validate_semantic(output: dict, manifest: Optional[dict] = None, strict_sources: bool = False) -> list[str]:\n',
              '''\ndef _is_finite_number(value: object) -> bool:\n    return (\n        isinstance(value, (int, float))\n        and not isinstance(value, bool)\n        and math.isfinite(value)\n    )\n\n\ndef validate_semantic(output: dict, manifest: Optional[dict] = None, strict_sources: bool = False) -> list[str]:\n''',
          )
          replace_once(
              cli,
              '''                ref_time = ref_run.get("metrics", {}).get("timing", {}).get("fit_time_ms")\n                run_time = run.get("metrics", {}).get("timing", {}).get("fit_time_ms")\n                if not ref_time or not run_time:\n                    errors.append(f"{rid}: computed speedup requires positive timing on both runs")\n                else:\n                    expected = ref_time / run_time\n                    if abs(sp.get("value", 0) - expected) > max(1e-4, abs(expected) * 1e-4):\n                        errors.append(f"{rid}: computed speedup value does not match referenced timing")\n''',
              '''                ref_time = ref_run.get("metrics", {}).get("timing", {}).get("fit_time_ms")\n                run_time = run.get("metrics", {}).get("timing", {}).get("fit_time_ms")\n                if (\n                    not _is_finite_number(ref_time)\n                    or not _is_finite_number(run_time)\n                    or ref_time <= 0\n                    or run_time <= 0\n                ):\n                    errors.append(f"{rid}: computed speedup requires positive numeric timing on both runs")\n                else:\n                    expected = ref_time / run_time\n                    speedup_value = sp.get("value")\n                    if not _is_finite_number(speedup_value):\n                        errors.append(f"{rid}: computed speedup value must be numeric")\n                    elif abs(speedup_value - expected) > max(1e-4, abs(expected) * 1e-4):\n                        errors.append(f"{rid}: computed speedup value does not match referenced timing")\n''',
          )
          replace_once(
              cli,
              '''                ref_time = ref_run.get("metrics", {}).get("timing", {}).get("fit_time_ms", 0)\n                if ref_time <= 0:\n                    errors.append(f"{run['run_id']}: speedup reference run has no positive timing")\n''',
              '''                ref_time = ref_run.get("metrics", {}).get("timing", {}).get("fit_time_ms")\n                if not _is_finite_number(ref_time) or ref_time <= 0:\n                    errors.append(f"{run['run_id']}: speedup reference run has no positive numeric timing")\n''',
          )
          replace_once(
              cli,
              '''            ft = t.get("fit_time_ms", -1)\n            if ft < 0:\n                errors.append(f"{rid}: timing.fit_time_ms < 0 ({ft})")\n            if "std_ms" in t and t["std_ms"] < 0:\n                errors.append(f"{rid}: timing.std_ms < 0")\n            if "min_ms" in t and "max_ms" in t and t["min_ms"] > t["max_ms"]:\n                errors.append(f"{rid}: timing.min_ms > max_ms")\n''',
              '''            ft = t.get("fit_time_ms")\n            if not _is_finite_number(ft) or ft <= 0:\n                errors.append(\n                    f"{rid}: timing.fit_time_ms must be a finite number > 0 ({ft!r})"\n                )\n\n            for name in ("std_ms", "min_ms", "max_ms"):\n                if name not in t:\n                    continue\n                value = t[name]\n                if not _is_finite_number(value):\n                    errors.append(f"{rid}: timing.{name} must be a finite number")\n                elif value < 0:\n                    errors.append(f"{rid}: timing.{name} < 0")\n\n            min_ms = t.get("min_ms")\n            max_ms = t.get("max_ms")\n            if (\n                _is_finite_number(min_ms)\n                and _is_finite_number(max_ms)\n                and min_ms > max_ms\n            ):\n                errors.append(f"{rid}: timing.min_ms > max_ms")\n''',
          )
          replace_once(
              cli,
              '''            s = metrics["speedup"]\n            if s.get("value", -1) < 0:\n                errors.append(f"{rid}: speedup.value must be >= 0")\n''',
              '''            s = metrics["speedup"]\n            speedup_value = s.get("value")\n            if not _is_finite_number(speedup_value) or speedup_value < 0:\n                errors.append(f"{rid}: speedup.value must be a finite number >= 0")\n''',
          )

          schema = Path('dev/benchmarks/benchmark_frontend_schema.json')
          replace_once(
              schema,
              '"fit_time_ms": { "type": "number", "minimum": 0 }',
              '"fit_time_ms": { "type": "number", "exclusiveMinimum": 0 }',
          )

          wrapper = Path('dev/benchmarks/generate_benchmark_data.py')
          replace_once(
              wrapper,
              'from dev.benchmarks import frontend_data as _frontend_data\n',
              '',
          )
          replace_once(
              wrapper,
              '    generate,\n    validate_against_schema,\n',
              '    generate,\n    validate_output,\n    validate_against_schema,\n',
          )
          replace_once(
              wrapper,
              '''\ndef validate_output(output: dict) -> list[str]:\n    """Validate the normalized bundle, including log-axis timing safety.\n\n    A zero wall-clock duration is not a meaningful measured benchmark and cannot\n    be represented by the dashboard's logarithmic timing axis. Treat every\n    emitted timing as strictly positive rather than silently dropping the bar.\n    """\n    errors = _frontend_data.validate_output(output)\n    for run in output.get("runs", []):\n        timing = run.get("metrics", {}).get("timing")\n        if timing is None:\n            continue\n        fit_time_ms = timing.get("fit_time_ms")\n        if not isinstance(fit_time_ms, (int, float)) or fit_time_ms <= 0:\n            errors.append(\n                f"{run.get('run_id', '?')}: timing.fit_time_ms must be > 0 "\n                f"for logarithmic charting ({fit_time_ms})"\n            )\n    return errors\n\n''',
              '\n',
          )
          replace_once(
              wrapper,
              '''def main() -> None:\n    # cli.main resolves validate_output from its module globals. Patch that\n    # public validation hook so both --check and write mode enforce the same\n    # strictly-positive timing contract.\n    from dev.benchmarks.frontend_data import cli as _cli\n\n    _cli.validate_output = validate_output\n    _cli.main()\n''',
              '''def main() -> None:\n    from dev.benchmarks.frontend_data import cli as _cli\n\n    _cli.main()\n''',
          )

          tests = Path('dev/tests/test_frontend_contracts.py')
          text = tests.read_text(encoding='utf-8')
          marker = 'def test_core_validator_rejects_nonpositive_and_nonnumeric_fit_time() -> None:'
          if marker not in text:
              text += '''\n\ndef _minimal_timing_output(fit_time_ms: object) -> dict:\n    return {\n        "runs": [\n            {\n                "run_id": "timing-regression",\n                "env_id": "remote-p100",\n                "category_ids": ["linear_models"],\n                "model_id": "ExampleModel",\n                "framework": "statgpu",\n                "backend": "numpy",\n                "scale": {},\n                "source": {},\n                "metrics": {"timing": {"fit_time_ms": fit_time_ms}},\n            }\n        ]\n    }\n\n\ndef test_core_validator_rejects_nonpositive_and_nonnumeric_fit_time() -> None:\n    from dev.benchmarks.frontend_data import validate_output\n\n    for bad_value in (0, -1, "0", None, True):\n        errors = validate_output(_minimal_timing_output(bad_value))\n        assert any(\n            "timing.fit_time_ms must be a finite number > 0" in error\n            for error in errors\n        )\n\n\ndef test_wrapper_exports_core_timing_validator() -> None:\n    from dev.benchmarks import generate_benchmark_data as wrapper\n    from dev.benchmarks.frontend_data import validate_output as core_validate_output\n\n    assert wrapper.validate_output is core_validate_output\n\n\ndef test_schema_rejects_zero_fit_time() -> None:\n    from dev.benchmarks.frontend_data.registry import load_manifest\n    from dev.benchmarks.generate_benchmark_data import generate, validate_against_schema\n\n    manifest = load_manifest(REPO_ROOT)\n    assert manifest is not None\n    output, _, _ = generate(\n        REPO_ROOT / "results",\n        deterministic=True,\n        manifest=manifest,\n    )\n    run = next(run for run in output["runs"] if run.get("metrics", {}).get("timing"))\n    run["metrics"]["timing"]["fit_time_ms"] = 0\n\n    errors = validate_against_schema(output)\n    assert any("fit_time_ms" in error for error in errors)\n'''
              tests.write_text(text, encoding='utf-8')
          PY
      - name: Commit core timing validation fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'fix(benchmarks): centralize timing validation'
          branch: feature/benchmark-frontend-dashboard
          file_pattern: dev/benchmarks/frontend_data/cli.py dev/benchmarks/benchmark_frontend_schema.json dev/benchmarks/generate_benchmark_data.py dev/tests/test_frontend_contracts.py

  python-data:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.11']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -U pip pytest jsonschema
      - name: Run generator and parser tests
        run: |
          pytest \
            dev/tests/test_benchmark_frontend_data.py \
            dev/tests/test_frontend_contracts.py \
            dev/tests/test_frontend_domain_coverage.py -v
      - name: Validate generator output
        run: python dev/benchmarks/generate_benchmark_data.py --check --strict-sources

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Reject committed frontend artifacts
        run: |
          if git -C "$GITHUB_WORKSPACE" ls-files \
            'frontend/node_modules/**' \
            'frontend/test-results/**' \
            'frontend/playwright-report/**' | grep -q .; then
            echo "Generated frontend dependencies/test artifacts must not be committed."
            exit 1
          fi
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  staleness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate data (deterministic)
        run: |
          python dev/benchmarks/generate_benchmark_data.py \
            --out frontend/public/data/benchmark_data.json \
            --report frontend/public/data/parse_report.json \
            --inventory-out frontend/public/data/source_inventory.json \
            --deterministic --strict-sources
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Check staleness
        run: |
          changes="$(git status --porcelain -- frontend/public/data docs/assets/benchmarks)"
          if [ -n "$changes" ]; then
            echo "Generated benchmark assets are stale:"
            printf '%s\n' "$changes"
            git diff -- frontend/public/data docs/assets/benchmarks
            exit 1
          fi
          echo "OK — generated benchmark assets are current"

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: [frontend, staleness]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30