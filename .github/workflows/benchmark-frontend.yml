name: Benchmark Frontend CI

on:
  pull_request:
    paths:
      - '.github/workflows/benchmark-frontend.yml'
      - 'dev/benchmarks/**'
      - 'dev/tests/test_frontend_contracts.py'
      - 'pyproject.toml'

permissions:
  contents: write

jobs:
  review-fix:
    if: github.head_ref == 'feature/benchmark-frontend-dashboard'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: python -m pip install -U pip pytest 'jsonschema[format]'
      - name: Apply provenance and format-validation fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          cli_path = Path('dev/benchmarks/frontend_data/cli.py')
          text = cli_path.read_text(encoding='utf-8')

          old_hash = '''            if manifest_src.get("source_date"):
                run["source"]["date"] = manifest_src["source_date"]
'''
          new_hash = '''            if manifest_src.get("source_date"):
                run["source"]["date"] = manifest_src["source_date"]
            if manifest_src.get("sha256"):
                run["source"]["sha256"] = manifest_src["sha256"]
'''
          if new_hash not in text:
              if old_hash not in text:
                  raise SystemExit('Canonical provenance insertion point not found')
              text = text.replace(old_hash, new_hash, 1)

          old_validator = '    validator = Validator(schema)\n'
          new_validator = '    validator = Validator(schema, format_checker=Validator.FORMAT_CHECKER)\n'
          if new_validator not in text:
              if old_validator not in text:
                  raise SystemExit('JSON Schema validator construction not found')
              text = text.replace(old_validator, new_validator, 1)

          cli_path.write_text(text, encoding='utf-8')

          test_path = Path('dev/tests/test_frontend_contracts.py')
          tests = test_path.read_text(encoding='utf-8')
          addition = r'''


def test_canonical_runs_preserve_manifest_source_hashes() -> None:
    from dev.benchmarks.frontend_data.registry import load_manifest
    from dev.benchmarks.generate_benchmark_data import generate

    manifest = load_manifest(REPO_ROOT)
    assert manifest is not None
    output, _, _ = generate(
        REPO_ROOT / "results",
        deterministic=True,
        manifest=manifest,
    )
    expected = {
        source["source_id"]: source["sha256"]
        for source in manifest["sources"]
        if source.get("sha256")
    }

    assert output["runs"]
    for run in output["runs"]:
        source = run["source"]
        assert source["sha256"] == expected[source["source_id"]]


def test_schema_rejects_invalid_generated_date_time() -> None:
    from dev.benchmarks.frontend_data.registry import load_manifest
    from dev.benchmarks.generate_benchmark_data import generate, validate_against_schema

    manifest = load_manifest(REPO_ROOT)
    assert manifest is not None
    output, _, _ = generate(
        REPO_ROOT / "results",
        deterministic=True,
        manifest=manifest,
    )
    output["generated"] = "not-a-date-time"

    errors = validate_against_schema(output)
    assert any("generated" in error and "date-time" in error for error in errors)
'''
          if 'def test_canonical_runs_preserve_manifest_source_hashes' not in tests:
              test_path.write_text(tests.rstrip() + addition + '\n', encoding='utf-8')
          PY
      - name: Run focused contract tests
        run: pytest dev/tests/test_frontend_contracts.py -v
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'fix(benchmarks): preserve source hashes and validate date formats'
          branch: feature/benchmark-frontend-dashboard
          file_pattern: 'dev/benchmarks/frontend_data/cli.py dev/tests/test_frontend_contracts.py'
