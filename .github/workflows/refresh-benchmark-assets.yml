name: One-off benchmark asset refresh

on:
  push:
    branches: [frontend-dashboard-data-pipeline]
    paths:
      - '.github/workflows/refresh-benchmark-assets.yml'

permissions:
  contents: write

jobs:
  refresh-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: frontend-dashboard-data-pipeline
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate canonical data
        run: |
          python dev/benchmarks/generate_benchmark_data.py \
            --out frontend/public/data/benchmark_data.json \
            --report frontend/public/data/parse_report.json \
            --inventory-out frontend/public/data/source_inventory.json \
            --deterministic --strict-sources
      - name: Build deployable dashboard
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Commit refreshed assets
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A frontend/public/data docs/assets/benchmarks
          if git diff --cached --quiet; then
            echo 'Benchmark assets are already current'
            exit 0
          fi
          git commit -m 'build(frontend): refresh benchmark dashboard assets'
          git push origin HEAD:frontend-dashboard-data-pipeline
