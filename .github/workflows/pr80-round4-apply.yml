name: PR80 round-four review fix

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-review-fix:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'codex/survival-gpu-completion'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verify and apply reviewed patch
        shell: bash
        run: |
          set -euo pipefail
          echo 'c15c9831631aad18f6a16fd93880a9fb30cb61ee8d4cada3758e550eab631676  .github/pr80-round4-fixes.patch.gz' | sha256sum -c -
          gzip -dc .github/pr80-round4-fixes.patch.gz > /tmp/pr80-round4-fixes.patch
          echo '58273674109e0e36c836be9b03d4365352d377c9513b3aa7746a886619e1dcee  /tmp/pr80-round4-fixes.patch' | sha256sum -c -
          git apply --check /tmp/pr80-round4-fixes.patch
          git apply /tmp/pr80-round4-fixes.patch

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install pyflakes

      - name: Validate fourth-round fixes
        run: |
          python -m compileall -q statgpu dev/tests
          python -m pyflakes \
            statgpu/core/formula/_terms.py \
            statgpu/linear_model/penalized/_predict_mixin.py \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/penalties/_base.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_cv.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_penalties_and_exports.py
          python -m pytest \
            dev/tests/test_cox.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            dev/tests/test_panel_formula.py \
            dev/tests/test_penalties_and_exports.py \
            dev/tests/test_loss_penalty_solver_matrix.py \
            dev/tests/test_refactor_safety_net.py \
            dev/tests/test_refactor_post_phase.py \
            -q --tb=short

      - name: Commit reviewed fixes and remove temporary files
        run: |
          git config user.name "OpenAI Review"
          git config user.email "review@openai.local"
          git add \
            CHANGELOG.md \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_penalties_and_exports.py \
            docs/cn/changelog.md \
            docs/cn/models/coxph.md \
            docs/en/changelog.md \
            docs/en/models/coxph.md \
            statgpu/core/formula/_terms.py \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/linear_model/penalized/_predict_mixin.py \
            statgpu/penalties/_base.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_cv.py
          git rm \
            .github/pr80-round4-fixes.patch.gz \
            .github/workflows/pr80-round4-export.yml \
            .github/workflows/pr80-round4-apply.yml
          git commit -m "fix(survival): address fourth PR review findings"
          git push origin HEAD:${{ github.head_ref }}
