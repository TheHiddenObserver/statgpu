name: PR79 Static Annotation Fix

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  fix-annotation:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply correction
        run: python dev/scripts/fix_penalized_linear_type_checking.py
      - name: Verify static gate
        run: |
          python -m pip install ruff
          ruff check statgpu/linear_model/penalized/_penalized_linear.py --select F821,E9,F63,F7,F82
      - name: Remove temporary files
        run: |
          rm -f dev/scripts/fix_penalized_linear_type_checking.py
          rm -f .github/workflows/pr79-fix-static-annotation.yml
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: resolve penalized linear type annotation'
          git push origin HEAD:${{ github.head_ref }}
