name: PR76 Review Fix Bootstrap

on:
  push:
    branches:
      - feature/benchmark-frontend-dashboard
    paths:
      - '.github/workflows/review-fix-bootstrap.yml'

permissions:
  contents: write

concurrency:
  group: pr76-review-fix-bootstrap
  cancel-in-progress: false

jobs:
  apply-and-verify:
    if: github.repository == 'TheHiddenObserver/statgpu'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/benchmark-frontend-dashboard
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python validation dependencies
        run: python -m pip install -U pip pytest 'jsonschema[format]'

      - name: Apply review fixes
        run: python dev/benchmarks/apply_review_fix.py

      - name: Run Python benchmark contracts
        run: |
          pytest \
            dev/tests/test_benchmark_frontend_data.py \
            dev/tests/test_frontend_contracts.py \
            dev/tests/test_frontend_domain_coverage.py -v
          python dev/benchmarks/generate_benchmark_data.py --check --strict-sources

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify frontend typecheck and build
        working-directory: frontend
        run: |
          npm ci
          npm run typecheck
          npm run build

      - name: Commit verified fixes and remove bootstrap
        run: |
          rm .github/workflows/review-fix-bootstrap.yml
          rm dev/benchmarks/apply_review_fix.py
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            .github/workflows/review-fix-bootstrap.yml \
            dev/benchmarks/apply_review_fix.py \
            dev/benchmarks/frontend_data/cli.py \
            dev/benchmarks/frontend_data/__init__.py \
            dev/tests/test_frontend_contracts.py \
            frontend/src/identity.ts \
            frontend/src/charts/TimingChart.ts \
            frontend/src/charts/SpeedupChart.ts
          git commit -m 'fix(frontend): preserve focused coverage and canonical contracts'
          git push origin HEAD:feature/benchmark-frontend-dashboard
