name: PR84 Documentation Link Diagnostics

on:
  push:
    branches: [agent/readme-layout-cleanup]

permissions:
  contents: read

jobs:
  diagnose-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate normalization diff
        shell: bash
        run: |
          python3 dev/validation/fix_docs_links.py --write > docs-link-diagnostics.log 2>&1
          git diff --name-only -- docs >> docs-link-diagnostics.log
          git diff -- docs >> docs-link-diagnostics.log
      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: docs-link-diagnostics
          path: docs-link-diagnostics.log
          if-no-files-found: error
