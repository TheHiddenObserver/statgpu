name: PR80 source export

on:
  push:
    branches:
      - codex/survival-gpu-completion

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/survival-gpu-completion
      - name: Upload source tree
        uses: actions/upload-artifact@v4
        with:
          name: statgpu-pr80-source
          path: |
            .
            !.git
          include-hidden-files: true
          retention-days: 1
