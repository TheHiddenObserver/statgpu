name: PR80 review fixes

on:
  push:
    branches:
      - codex/survival-gpu-completion

permissions:
  contents: write

jobs:
  apply-review-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: codex/survival-gpu-completion
          fetch-depth: 0
      - name: Decode and apply reviewed patch
        shell: bash
        run: |
          cat > /tmp/pr80-review-fixes.patch.gz.b64 <<'PATCH_B64'
          
          PATCH_B64
          base64 -d /tmp/pr80-review-fixes.patch.gz.b64 | gzip -d > /tmp/pr80-review-fixes.patch
          if git apply --check /tmp/pr80-review-fixes.patch; then
            git apply /tmp/pr80-review-fixes.patch
          elif git apply --reverse --check /tmp/pr80-review-fixes.patch; then
            echo "Reviewed patch is already applied."
            exit 0
          else
            echo "Reviewed patch no longer applies cleanly." >&2
            exit 1
          fi
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install pyflakes
      - name: Static and targeted validation
        run: |
          python -m compileall -q statgpu dev/tests
          python -m pyflakes \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/losses/_cox_ph.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_counting.py \
            statgpu/survival/_cox_cv.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py
          python -m pytest \
            dev/tests/test_cox.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            -q --tb=short
      - name: Commit reviewed fixes
        run: |
          git config user.name "OpenAI Review"
          git config user.email "review@openai.local"
          git add \
            CHANGELOG.md \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            docs/cn/changelog.md \
            docs/cn/models/coxph.md \
            docs/en/changelog.md \
            docs/en/models/coxph.md \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/losses/_cox_ph.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_counting.py \
            statgpu/survival/_cox_cv.py
          git commit -m "fix(survival): address PR review findings"
          git push origin HEAD:codex/survival-gpu-completion
