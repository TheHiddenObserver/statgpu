name: PR80 source export

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - codex/survival-gpu-completion

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
      - name: Upload PR source tree
        uses: actions/upload-artifact@v4
        with:
          name: statgpu-pr80-source
          path: |
            .
            !.git
            !base-source
          include-hidden-files: true
          retention-days: 1
      - name: Check out master baseline
        uses: actions/checkout@v4
        with:
          ref: master
          path: base-source
      - name: Upload master source tree
        uses: actions/upload-artifact@v4
        with:
          name: statgpu-pr80-base
          path: |
            base-source
            !base-source/.git
          include-hidden-files: true
          retention-days: 1
