name: PR79 Source Export

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  export-source:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Package source snapshot
        run: |
          tar --exclude=.git --exclude='*.pyc' --exclude='__pycache__' -czf /tmp/statgpu-pr79-source.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: statgpu-pr79-source
          path: /tmp/statgpu-pr79-source.tar.gz
          retention-days: 2
