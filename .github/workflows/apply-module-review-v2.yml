name: Apply ANOVA Kernel Review V2

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  apply-review-patch-v2:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply focused patch
        run: python dev/manual/apply_anova_kernel_review.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff
      - name: Compile and statically check modified modules
        run: |
          python -m compileall -q statgpu/anova statgpu/nonparametric/kernel_methods dev/tests
          ruff check statgpu/anova statgpu/nonparametric/kernel_methods \
            dev/tests/test_module_review_anova_kernel.py \
            --select F821,E9,F63,F7,F82,B023
      - name: Run focused and existing regression tests
        run: |
          set +e
          python -m pytest \
            dev/tests/test_module_review_anova_kernel.py \
            dev/tests/test_anova_p2.py \
            dev/tests/test_kernel_methods_p2.py \
            -q --tb=short > /tmp/module-review-tests.log 2>&1
          status=$?
          cat /tmp/module-review-tests.log
          exit $status
      - name: Commit reviewed source changes
        run: |
          rm -f dev/manual/apply_anova_kernel_review.py
          rm -f dev/manual/apply_anova_kernel_review_core.py
          rm -f dev/manual/apply_anova_kernel_review_wrapper.tmp
          rm -f dev/manual/README_RETRY.tmp dev/manual/retry-note.tmp
          rm -f dev/manual/atomic-retry-placeholder.tmp dev/manual/final-retry-marker.tmp
          rm -f dev/manual/noop.tmp dev/manual/last-noop.tmp
          rm -f .github/anova-kernel-review-trigger
          rm -f .github/workflows/apply-module-review.yml
          rm -f .github/workflows/apply-module-review-v2.yml
          rm -f .github/workflows/repository-audit.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: harden ANOVA and kernel method contracts'
          git push origin HEAD:agent/code-review-fixes
