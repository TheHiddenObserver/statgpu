              r'''        # OLS: use rank-revealing solver for stability with near-singular designs\n.*?                                cluster=cluster\)\n''',
              '''        # OLS: use a rank-revealing solver and rank-aware residual df.
        params, rank = _panel_lstsq(X_arr, y_arr, xp)
        df_resid = n - rank
        if df_resid <= 0:
            raise ValueError(
                f"positive residual degrees of freedom required; n={n}, rank={rank}"
            )
        resid = y_arr - X_arr @ params
        scale = _to_float_scalar(xp.sum(resid * resid)) / df_resid

        # Inference
        self._compute_inference(
            X_arr, resid, params, scale, n, k, df_resid, xp, backend.name,
            cluster=cluster,
        )
''',
              flags=re.DOTALL,
          )
          replace_once(
              pooled,
              '''        self.nobs = n
        self.df_resid = n - k
        self._fitted = True
''',
              '''        self.nobs = n
        self.rank_ = rank
        self.df_resid = df_resid
        self._fitted = True
''',
          )
          replace_once(
