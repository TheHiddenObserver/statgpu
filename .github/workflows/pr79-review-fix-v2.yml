          text = text.replace(raw_old, raw_new, 1)
          remote_old = '''        full_cmd = (
            f"{CONDA_ACTIVATE} && "
            f"cd {wt} && "
            f"{env_prefix}"
            f"{cmd}"
        )
'''
          remote_new = '''        full_cmd = (
            f"{CONDA_ACTIVATE} && "
            f"cd {wt} && "
            f"{env_prefix}"
            f"bash -o pipefail -c {shlex.quote(cmd)}"
        )
'''
          if text.count(remote_old) != 1:
              raise RuntimeError(f"{orch}: run_remote command block mismatch")
          p.write_text(text.replace(remote_old, remote_new, 1))

          replace_once(
              orch,
              '''    def upload_package(self):
        """Upload the statgpu package and dev/ directory to remote worktrees.

