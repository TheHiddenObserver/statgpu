name: PR79 review fix v2

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply-review-fixes:
    if: github.event.pull_request.number == 79
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Apply review fixes
        run: |
          cat > /tmp/apply_pr79_fixes.py <<'PY'
          from pathlib import Path
          import re


          def sub_once(path, pattern, replacement, *, flags=0):
              p = Path(path)
              text = p.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=flags)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one regex match, found {count}: {pattern[:80]!r}")
              p.write_text(updated)


          def replace_once(path, old, new):
              p = Path(path)
              text = p.read_text()
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one literal match, found {count}: {old[:80]!r}")
              p.write_text(text.replace(old, new, 1))


          # ------------------------------------------------------------------
          # LinearRegression: preserve backend-native arrays until dispatch.
          # ------------------------------------------------------------------
          linear = "statgpu/linear_model/wrappers/_linear.py"
          sub_once(
              linear,
              r'''            # Handle CuPy/Torch inputs safely \(CuPy 13\+ forbids implicit asarray\)\n.*?            except TypeError:\n                X_arr = _to_numpy\(X\)\n''',
              '''            # Preserve backend-native inputs. Conversion is performed only
            # after the estimator backend has been resolved below.
            X_arr = X
            y_arr = y
''',
              flags=re.DOTALL,
          )
          sub_once(
              linear,
              r'''        self\.fit_intercept = _orig_fit_intercept\n        # Store y \(may be CuPy/Torch array, convert later for CPU\)\n        self\._y = y_arr\n\n        # Get backend - support explicit torch backend selection\n        backend = self\._get_backend\(backend="auto"\)\n        backend_name = backend\.name\n\n        X_arr = self\._to_array\(X_arr, backend=backend_name\)\n        y_arr = self\._to_array\(y_arr, backend=backend_name\)\n        self\._is_multi_output = y_arr\.ndim > 1 and y_arr\.shape\[1\] > 1\n''',
              '''        self.fit_intercept = _orig_fit_intercept

        # Resolve the backend before converting raw arrays so CuPy/Torch inputs
        # never make a GPU -> CPU -> GPU round trip.
        backend = self._get_backend(backend="auto")
        backend_name = backend.name

        X_arr = self._to_array(X_arr, backend=backend_name)
        y_arr = self._to_array(y_arr, backend=backend_name)
        if y_arr.ndim == 2 and y_arr.shape[1] == 1:
            y_arr = y_arr.reshape(-1)
        self._y = y_arr
        self._is_multi_output = y_arr.ndim > 1 and y_arr.shape[1] > 1
''',
          )
          replace_once(
              linear,
              '''            else:
                X = np.asarray(X)
        else:
            X = np.asarray(X)
''',
              '''            else:
                # Preserve backend-native arrays; conversion happens below.
                pass
        else:
            # Preserve backend-native arrays; conversion happens below.
            pass
''',
          )

          # ------------------------------------------------------------------
          # PooledOLS: time-aware HAC and rank-aware inference.
          # ------------------------------------------------------------------
          pooled = "statgpu/panel/_pooled.py"
          sub_once(
              pooled,
              r'''def _panel_lstsq\(X, y, xp\):\n.*?\n\nclass PooledOLS''',
              '''def _panel_lstsq(X, y, xp):
    """Return least-squares coefficients and the effective design rank."""
    if getattr(xp, "__name__", "") == "torch":
        params = xp.linalg.pinv(X) @ y
        rank = int(_to_float_scalar(xp.linalg.matrix_rank(X)))
        return params, rank
    try:
        result = xp.linalg.lstsq(X, y, rcond=None)
        params = result[0]
        rank = int(_to_float_scalar(result[2]))
        return params, rank
    except (TypeError, AttributeError, np.linalg.LinAlgError):
        params = xp.linalg.pinv(X) @ y
        rank = int(_to_float_scalar(xp.linalg.matrix_rank(X)))
        return params, rank


class PooledOLS''',
              flags=re.DOTALL,
          )
          replace_once(
              pooled,
              '''        time_index : array-like, shape (n,), optional
            Time index for HAC estimation.  Data should be sorted by time.
''',
              '''        time_index : array-like, shape (n,), optional
            Time index for HAC estimation. When supplied, observations are
            stably sorted by this index before the Newey-West calculation.
''',
          )
          replace_once(
              pooled,
              '''        validate_panel_alpha(self.alpha)
        validate_panel_numeric_data(X_arr, y_arr, xp)

        # Add intercept
''',
              '''        validate_panel_alpha(self.alpha)
        validate_panel_numeric_data(X_arr, y_arr, xp)

        # HAC depends on temporal ordering. Metadata may remain on CPU, but the
        # numerical arrays are reordered on their selected backend.
        if self.cov_type == "hac" and time_index is not None:
            time_values = np.asarray(_to_numpy(time_index))
            if time_values.ndim != 1 or time_values.shape[0] != X_arr.shape[0]:
                raise ValueError("time_index must be one-dimensional with length n_samples")
            order_np = np.argsort(time_values, kind="stable")
            order = xp_asarray(order_np, dtype=xp.int64, xp=xp, ref_arr=X_arr)
            X_arr = X_arr[order]
            y_arr = y_arr[order]

        # Add intercept
''',
          )
          sub_once(
