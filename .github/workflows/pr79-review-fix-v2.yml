                return False

        self._log("Setup complete!")
        return True
''',
          )
          replace_once(
              orch,
              '''            base_sha="a4879fb4d9fb183efc01f147cd2cc501691f28c4",
            head_sha="e30cec6768a734a0d61dfec44b6b4884adf9a880",
''',
              '''            base_sha=GIT_INFO["base_sha"],
