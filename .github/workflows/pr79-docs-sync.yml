name: PR79 Documentation Sync

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  sync-docs:
    if: github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Synchronize public documentation
        id: sync
        continue-on-error: true
        run: |
          python dev/scripts/run_pr79_docs_sync_relaxed.py > /tmp/pr79-docs-sync.log 2>&1
      - name: Upload sync diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr79-docs-sync-log
          path: /tmp/pr79-docs-sync.log
          retention-days: 2
      - name: Enforce synchronization result
        if: steps.sync.outcome != 'success'
        run: |
          cat /tmp/pr79-docs-sync.log
          exit 1
      - name: Remove temporary synchronizer
        run: |
          rm -f dev/scripts/sync_pr79_public_docs.py
          rm -f dev/scripts/run_pr79_docs_sync_relaxed.py
          rm -f .github/workflows/pr79-docs-sync.yml
      - name: Commit synchronized documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No documentation changes"
            exit 0
          fi
          git commit -m "docs: synchronize native backend documentation"
          git push origin HEAD:${{ github.head_ref }}
