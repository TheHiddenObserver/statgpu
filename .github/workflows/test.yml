name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  final-review-autofix:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Correct staged helper indentation and apply fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('dev/scripts/apply_review_final.py')
          text = path.read_text()
          text = text.replace(
              "helper = dedent('''\n    @staticmethod\n    def _observed_information",
              "helper = '''    @staticmethod\n    def _observed_information",
          ).replace(
              "    def _compute_inference_cpu(self, X, time, event, cluster=None):\n''')",
              "    def _compute_inference_cpu(self, X, time, event, cluster=None):\n'''",
          )
          path.write_text(text)
          PY
          python dev/scripts/apply_review_final.py
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff
      - name: Compile and static checks
        run: |
          python -m py_compile statgpu/linear_model/wrappers/_ridge.py statgpu/survival/_cox.py
          ruff check statgpu/linear_model/wrappers/_ridge.py --select F821,E9,F63,F7,F82
      - name: Optional Torch contract
        run: python -m pytest 'dev/tests/test_dbscan_edge_cases.py::TestCrossBackendParity::test_quantile_scad_cross_backend[torch]' -q --tb=short
      - name: Cox Efron consistency
        run: python -m pytest 'dev/tests/test_external_consistency.py::TestStatsmodelsConsistency::test_cox_estimation_matches_statsmodels[cox-efron]' -q --tb=short
      - name: Ridge sklearn consistency
        run: |
          python -m pytest \
            'dev/tests/test_external_consistency.py::TestSklearnPenaltyConsistency::test_ridge_estimator_matches_sklearn[small]' \
            'dev/tests/test_external_consistency.py::TestSklearnPenaltyConsistency::test_ridge_estimator_matches_sklearn[medium]' \
            'dev/tests/test_external_consistency.py::TestSklearnPenaltyConsistency::test_ridge_estimator_matches_sklearn[large]' \
            -q --tb=short
      - name: Public loss namespace contract
        run: python -m pytest dev/tests/test_v10_import_smoke.py::test_losses_namespace_remains_a_public_compatibility_entrypoint -q --tb=short
      - name: Solver dispatch contract
        run: python -m pytest dev/tests/test_v10_import_smoke.py::test_penalized_glm_auto_solver_is_backend_aware -q --tb=short
      - name: Focused numerical and neighboring suites
        run: |
          python -m pytest \
            dev/tests/test_repository_review_final.py \
            dev/tests/test_cox.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_ridge_inference.py \
            dev/tests/test_ridge_cv.py \
            dev/tests/test_v10_import_smoke.py \
            -q --tb=short
      - name: Commit final fixes
        run: |
          git config user.name "OpenAI review agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add statgpu dev/tests
          git commit -m "fix: align Ridge and Cox inference contracts"
          git push origin HEAD:agent/code-review-fixes
