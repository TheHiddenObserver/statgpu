name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  core-regression-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Refactor safety net
        run: python -m pytest dev/tests/test_refactor_safety_net.py -q --tb=short
      - name: Refactor post phase
        run: python -m pytest dev/tests/test_refactor_post_phase.py -q --tb=short
      - name: Linear
        run: python -m pytest dev/tests/test_linear.py -q --tb=short
      - name: Logistic
        run: python -m pytest dev/tests/test_logistic.py -q --tb=short
      - name: Cox
        run: python -m pytest dev/tests/test_cox.py -q --tb=short
      - name: Cox CV
        run: python -m pytest dev/tests/test_cox_cv.py -q --tb=short
      - name: Penalties and exports
        run: python -m pytest dev/tests/test_penalties_and_exports.py -q --tb=short
      - name: Quantile
        run: python -m pytest dev/tests/test_quantile_regression.py -q --tb=short
