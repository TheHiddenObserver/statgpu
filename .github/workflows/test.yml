name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation]"

      - name: Run tests
        run: |
          python -m pytest dev/tests/test_refactor_safety_net.py dev/tests/test_refactor_post_phase.py dev/tests/test_linear.py dev/tests/test_logistic.py dev/tests/test_cox.py dev/tests/test_cox_cv.py dev/tests/test_distributions_backend.py dev/tests/test_penalties_and_exports.py dev/tests/test_ridge_inference.py dev/tests/test_lasso_debiased_inference.py dev/tests/test_unsupervised_pca.py dev/tests/test_unsupervised_kmeans.py dev/tests/test_unsupervised_dbscan.py dev/tests/test_unsupervised_gmm.py dev/tests/test_unsupervised_nmf.py dev/tests/test_unsupervised_tsne.py dev/tests/test_unsupervised_umap.py -q --tb=short
