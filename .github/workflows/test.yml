name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  cox-regression-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Cox basic breslow
        run: python -m pytest 'dev/tests/test_cox.py::TestCoxPH::test_basic_fit_cpu[breslow]' -q --tb=short
      - name: Cox basic efron
        run: python -m pytest 'dev/tests/test_cox.py::TestCoxPH::test_basic_fit_cpu[efron]' -q --tb=short
      - name: Cox no inference
        run: python -m pytest dev/tests/test_cox.py::TestCoxPH::test_compute_inference_false_cpu -q --tb=short
      - name: Cox nonrobust
        run: python -m pytest 'dev/tests/test_cox.py::TestCoxPH::test_cov_type_inference_cpu[nonrobust]' -q --tb=short
      - name: Cox HC0
        run: python -m pytest 'dev/tests/test_cox.py::TestCoxPH::test_cov_type_inference_cpu[hc0]' -q --tb=short
      - name: Cox HC1
        run: python -m pytest 'dev/tests/test_cox.py::TestCoxPH::test_cov_type_inference_cpu[hc1]' -q --tb=short
      - name: Cox cluster
        run: python -m pytest dev/tests/test_cox.py::TestCoxPH::test_cov_type_cluster_cpu -q --tb=short
      - name: Cox entry
        run: python -m pytest dev/tests/test_cox.py::TestCoxPH::test_entry_supported_cpu -q --tb=short
