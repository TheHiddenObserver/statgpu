name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"

      - name: Run tests
        run: |
          python -m pytest \
            dev/tests/test_refactor_safety_net.py \
            dev/tests/test_refactor_post_phase.py \
            dev/tests/test_linear.py \
            dev/tests/test_logistic.py \
            dev/tests/test_cox.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            dev/tests/test_distributions_backend.py \
            dev/tests/test_penalties_and_exports.py \
            dev/tests/test_ridge_inference.py \
            dev/tests/test_lasso_debiased_inference.py \
            dev/tests/test_ordered_cross_backend.py \
            dev/tests/test_hessian_fd_cpu.py \
            dev/tests/test_quantile_regression.py \
            dev/tests/test_unsupervised_pca.py \
            dev/tests/test_unsupervised_kmeans.py \
            dev/tests/test_unsupervised_dbscan.py \
            dev/tests/test_unsupervised_gmm.py \
            dev/tests/test_unsupervised_nmf.py \
            dev/tests/test_unsupervised_tsne.py \
            dev/tests/test_unsupervised_umap.py \
            -q --tb=short

  apply-pr80-review-fixes:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'codex/survival-gpu-completion'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install pyflakes

      - name: Extract and apply reviewed patch
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path

          workflow = Path('.github/workflows/pr80-export-source.yml').read_text()
          payload = workflow.split("<<'PATCH_B64'\n", 1)[1].split(
              '\n          PATCH_B64', 1
          )[0]
          encoded = ''.join(line.strip() for line in payload.splitlines())
          Path('/tmp/pr80-review-fixes.patch').write_bytes(
              gzip.decompress(base64.b64decode(encoded))
          )
          PY
          if git apply --check /tmp/pr80-review-fixes.patch; then
            git apply /tmp/pr80-review-fixes.patch
          elif git apply --reverse --check /tmp/pr80-review-fixes.patch; then
            echo "Reviewed patch is already applied."
            exit 0
          else
            echo "Reviewed patch no longer applies cleanly." >&2
            exit 1
          fi

      - name: Static and targeted validation
        run: |
          python -m compileall -q statgpu dev/tests
          python -m pyflakes \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/losses/_cox_ph.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_counting.py \
            statgpu/survival/_cox_cv.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py
          python -m pytest \
            dev/tests/test_cox.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_phase1_completion.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            -q --tb=short

      - name: Commit reviewed fixes
        run: |
          git config user.name "OpenAI Review"
          git config user.email "review@openai.local"
          git add \
            CHANGELOG.md \
            dev/tests/test_cox_core_completion.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_penalized_cox_completion.py \
            dev/tests/test_survival_risk_sets.py \
            docs/cn/changelog.md \
            docs/cn/models/coxph.md \
            docs/en/changelog.md \
            docs/en/models/coxph.md \
            statgpu/linear_model/penalized/_penalized_cox.py \
            statgpu/losses/_cox_ph.py \
            statgpu/survival/_cox.py \
            statgpu/survival/_cox_counting.py \
            statgpu/survival/_cox_cv.py
          git commit -m "fix(survival): address PR review findings"
          git push origin HEAD:${{ github.head_ref }}
