name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  full-suite-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Run complete test tree and capture report
        id: pytest
        shell: bash
        run: |
          set +e
          python -m pytest dev/tests -q --tb=short --maxfail=50 > full-suite.txt 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          tail -120 full-suite.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: full-suite-report-${{ github.sha }}
          path: full-suite.txt
          if-no-files-found: error
      - name: Enforce suite result
        run: test "${{ steps.pytest.outputs.exit_code }}" = "0"
