name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation]"
      - run: |
          python -m pytest dev/tests/test_refactor_safety_net.py dev/tests/test_refactor_post_phase.py dev/tests/test_linear.py dev/tests/test_logistic.py dev/tests/test_cox.py dev/tests/test_cox_cv.py dev/tests/test_distributions_backend.py dev/tests/test_penalties_and_exports.py dev/tests/test_ridge_inference.py dev/tests/test_lasso_debiased_inference.py dev/tests/test_ordered_cross_backend.py dev/tests/test_hessian_fd_cpu.py dev/tests/test_quantile_regression.py dev/tests/test_unsupervised_pca.py dev/tests/test_unsupervised_kmeans.py dev/tests/test_unsupervised_dbscan.py dev/tests/test_unsupervised_gmm.py dev/tests/test_unsupervised_nmf.py dev/tests/test_unsupervised_tsne.py dev/tests/test_unsupervised_umap.py dev/tests/test_inference_resampling.py dev/tests/test_core_contracts.py dev/tests/test_repository_review_regressions.py dev/tests/test_repository_review_batch2.py -q --tb=short

  repository-autofix:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/code-review-fixes'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply third reviewed batch
        run: python dev/scripts/apply_review_batch3.py
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff
      - name: Static checks
        run: |
          python -m compileall -q statgpu
          ruff check statgpu/_base.py --select F821,E9,F63,F7,F82
      - name: Targeted third-batch tests
        run: |
          python -m pytest dev/tests/test_repository_review_batch3.py dev/tests/test_inference_multiple_testing.py dev/tests/test_inference_resampling.py -q --tb=short
      - name: Commit third batch
        run: |
          git config user.name "OpenAI review agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add statgpu/_base.py dev/tests/test_repository_review_batch3.py
          git commit -m "fix: preserve Torch inference backend context"
          git push origin HEAD:agent/code-review-fixes
