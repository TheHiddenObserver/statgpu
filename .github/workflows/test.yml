name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  review-source-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Package review sources
        run: |
          tar -czf review-sources.tar.gz \
            statgpu/survival/_cox.py \
            statgpu/linear_model/wrappers/_ridge.py \
            statgpu/linear_model/penalized/_base.py \
            dev/tests/test_external_consistency.py \
            dev/tests/test_dbscan_edge_cases.py \
            dev/tests/test_v10_import_smoke.py \
            dev/tests/test_ridge_cv.py
      - uses: actions/upload-artifact@v4
        with:
          name: review-sources-${{ github.sha }}
          path: review-sources.tar.gz
          if-no-files-found: error
