name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  review-regression-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Core and model tests
        run: |
          python -m pytest dev/tests/test_refactor_safety_net.py dev/tests/test_refactor_post_phase.py dev/tests/test_linear.py dev/tests/test_logistic.py dev/tests/test_cox.py dev/tests/test_cox_cv.py dev/tests/test_penalties_and_exports.py dev/tests/test_quantile_regression.py -q --tb=short
      - name: Inference tests
        run: |
          python -m pytest dev/tests/test_distributions_backend.py dev/tests/test_ridge_inference.py dev/tests/test_lasso_debiased_inference.py dev/tests/test_ordered_cross_backend.py dev/tests/test_hessian_fd_cpu.py dev/tests/test_inference_resampling.py dev/tests/test_core_contracts.py -q --tb=short
      - name: Unsupervised tests
        run: |
          python -m pytest dev/tests/test_unsupervised_pca.py dev/tests/test_unsupervised_kmeans.py dev/tests/test_unsupervised_dbscan.py dev/tests/test_unsupervised_gmm.py dev/tests/test_unsupervised_nmf.py dev/tests/test_unsupervised_tsne.py dev/tests/test_unsupervised_umap.py -q --tb=short
      - name: Repository review regressions
        run: |
          python -m pytest dev/tests/test_repository_review_regressions.py dev/tests/test_repository_review_batch2.py -q --tb=short
      - name: Complete test collection
        run: python -m pytest --collect-only -q
