name: Tests

on:
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  restore-cox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/code-review-fixes
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Restore complete Cox implementation and fix undefined dimension
        run: |
          git show origin/master:statgpu/survival/_cox.py > statgpu/survival/_cox.py
          python - <<'PY'
          from pathlib import Path
          path = Path('statgpu/survival/_cox.py')
          text = path.read_text()
          old = '(X_exp[:, :, None] * X[:, None, :]).reshape(n, n_features * n_features)'
          new = '(X_exp[:, :, None] * X[:, None, :]).reshape(n_samples, n_features * n_features)'
          if text.count(old) != 1:
              raise RuntimeError(f'Cox undefined-n match count={text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
      - run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Validate Cox implementation
        run: |
          python -m compileall -q statgpu/survival/_cox.py
          python -m pytest dev/tests/test_cox.py dev/tests/test_cox_cv.py -q --tb=short
      - name: Commit restored Cox implementation
        run: |
          git config user.name "OpenAI review agent"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add statgpu/survival/_cox.py
          git commit -m "fix: restore Cox implementation and correct Hessian dimension"
          git push origin HEAD:agent/code-review-fixes
