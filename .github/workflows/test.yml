name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  docs-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check deterministic bilingual links
        run: python3 dev/validation/fix_docs_links.py --check
      - name: Check maintained documentation contracts
        run: python3 dev/validation/check_docs_contracts.py

  regression-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Run regression gate
        run: |
          python -m pytest \
            dev/tests/test_refactor_safety_net.py \
            dev/tests/test_refactor_post_phase.py \
            dev/tests/test_linear.py \
            dev/tests/test_logistic.py \
            dev/tests/test_cox.py \
            dev/tests/test_cox_cv.py \
            dev/tests/test_distributions_backend.py \
            dev/tests/test_penalties_and_exports.py \
            dev/tests/test_ridge_inference.py \
            dev/tests/test_ridge_weighted_consistency.py \
            dev/tests/test_lasso_debiased_inference.py \
            dev/tests/test_ordered_cross_backend.py \
            dev/tests/test_hessian_fd_cpu.py \
            dev/tests/test_quantile_regression.py \
            dev/tests/test_unsupervised_pca.py \
            dev/tests/test_unsupervised_kmeans.py \
            dev/tests/test_unsupervised_dbscan.py \
            dev/tests/test_unsupervised_gmm.py \
            dev/tests/test_unsupervised_nmf.py \
            dev/tests/test_unsupervised_tsne.py \
            dev/tests/test_unsupervised_umap.py \
            dev/tests/test_inference_resampling.py \
            dev/tests/test_core_contracts.py \
            dev/tests/test_repository_review_regressions.py \
            dev/tests/test_repository_review_batch2.py \
            dev/tests/test_repository_review_batch3.py \
            dev/tests/test_repository_review_final.py \
            dev/tests/test_module_review_anova_kernel.py \
            dev/tests/test_module_review_covariance_panel.py \
            dev/tests/test_module_review_smoothing_splines_gam_metrics.py \
            dev/tests/test_three_backend_native_followup.py \
            dev/tests/test_second_full_review.py \
            dev/tests/test_third_full_review.py \
            dev/tests/test_pr79_accuracy_git_integrity.py \
            dev/tests/test_pr79_accuracy_pipeline.py \
            dev/tests/test_pr79_complete_review_fixes.py \
            dev/tests/test_pr79_cox_full_matrix_contract.py \
            dev/tests/test_pr79_cox_parity_smoke.py \
            dev/tests/test_pr79_performance_followups.py \
            dev/tests/test_pr79_renderer_cli.py \
            dev/tests/test_pr79_survival_generator.py \
            dev/tests/test_elasticnet_cv.py \
            dev/tests/test_v10_import_smoke.py \
            -q --tb=short

  full-cpu-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
      - name: Run complete CPU test tree
        run: python -m pytest dev/tests -q --tb=short

  static-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[validation,formula]"
          python -m pip install ruff
      - name: Compile package and maintained dev scripts
        run: python -m compileall -q statgpu dev/validation dev/benchmarks
      - name: High-signal static checks
        run: |
          ruff check \
            statgpu/_base.py \
            statgpu/_config.py \
            statgpu/anova \
            statgpu/backends/_factory.py \
            statgpu/backends/_utils.py \
            statgpu/core/formula/_parser.py \
            statgpu/covariance \
            statgpu/cross_validation \
            statgpu/diagnostics \
            statgpu/feature_selection \
            statgpu/glm_core/_solver_utils.py \
            statgpu/inference/_resampling.py \
            statgpu/linear_model/_stats.py \
            statgpu/linear_model/cv/_ridge_cv.py \
            statgpu/linear_model/penalized/_fit_mixin.py \
            statgpu/linear_model/penalized/_inference_mixin.py \
            statgpu/linear_model/penalized/_penalized_cv.py \
            statgpu/linear_model/penalized/_penalized_linear.py \
            statgpu/linear_model/wrappers/_linear.py \
            statgpu/linear_model/wrappers/_ridge.py \
            statgpu/metrics \
            statgpu/nonparametric/kernel_methods \
            statgpu/nonparametric/kernel_smoothing \
            statgpu/panel \
            statgpu/penalties/_adaptive_l1.py \
            statgpu/penalties/_base.py \
            statgpu/semiparametric \
            statgpu/solvers/_fista_lla.py \
            statgpu/survival/_cox.py \
            statgpu/unsupervised/_kmeans.py \
            statgpu/unsupervised/_nndescent.py \
            statgpu/unsupervised/_umap.py \
            statgpu/unsupervised/_utils.py \
            --select F821,E9,F63,F7,F82
      - name: Cox behavior checks
        run: python -m pytest dev/tests/test_cox.py -q --tb=short
      - name: PR79 canonical accuracy evidence smoke
        shell: bash
        run: |
          artifact_dir="$(mktemp -d)"
          validated_sha="$(git rev-parse HEAD)"
          python dev/benchmarks/pr79/run_accuracy.py \
            --config smoke \
            --backend numpy \
            --output "$artifact_dir/raw.json"
          python dev/benchmarks/pr79/aggregate_results.py \
            --config smoke \
            --raw "$artifact_dir/raw.json" \
            --expected-sha "$validated_sha" \
            --output "$artifact_dir/validated.json"
          python dev/benchmarks/pr79/emit_final_report.py \
            --config smoke \
            --validated "$artifact_dir/validated.json" \
            --output-json "$artifact_dir/final.json" \
            --output-markdown "$artifact_dir/final.md"
          git diff --exit-code
      - name: Collect complete test tree
        run: python -m pytest --collect-only -q
